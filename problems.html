<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Problems — Goxira</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page-main { padding-top: 1.25rem; }

    /* ── Problem header ── */
    .problem-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .problem-meta {
      display: flex; align-items: center; gap: 0.5rem;
    }
    .topic-badge {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 0.2rem 0.6rem;
      border-radius: 100px; border: 1.5px solid var(--ink-faint);
      color: var(--ink-faint);
    }
    .to-play {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.8rem; color: var(--ink-light); font-weight: 500;
    }
    .to-play__stone {
      width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
    }
    .to-play__stone--b { background: var(--ink); }
    .to-play__stone--w { background: white; border: 1.5px solid var(--ink-faint); }

    /* ── Board container ── */
    .board-container {
      background: var(--board);
      border-radius: var(--r-lg);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      margin-bottom: 1rem;
      position: relative;
      /* Prevent scroll hijack during touch on board */
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .board-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--board);
      z-index: 10;
    }
    /* Make the SVG fill the container width always */
    .board-container svg {
      width: 100% !important;
      height: auto !important;
      display: block;
    }

    /* ── Description ── */
    .problem-description {
      background: var(--paper-warm);
      border: 1px solid var(--paper-deep);
      border-radius: var(--r-md);
      padding: 0.875rem 1rem;
      font-family: var(--font-serif);
      font-size: 0.925rem; line-height: 1.6;
      color: var(--ink-light);
      margin-bottom: 1rem;
    }

    /* ── Attempt dots ── */
    .attempts-row {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.875rem;
    }
    .attempts-label { font-size: 0.75rem; color: var(--ink-faint); }
    .attempt-pip {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--paper-deep); transition: background 0.2s;
    }
    .attempt-pip--wrong   { background: var(--wrong); }
    .attempt-pip--correct { background: var(--correct); }

    /* ── Commentary ── */
    .commentary-box {
      background: white;
      border: 1px solid var(--paper-deep);
      border-left: 3px solid var(--accent);
      border-radius: var(--r-md);
      padding: 0.875rem 1rem;
      font-family: var(--font-serif);
      font-size: 0.9rem; line-height: 1.65;
      color: var(--ink-light);
      margin-bottom: 1rem;
      min-height: 60px;
      display: none;
    }
    .commentary-box.show { display: block; }
    .commentary-box.correct { border-left-color: var(--correct); }
    .commentary-box.wrong   { border-left-color: var(--wrong); }

    /* ── Action buttons ── */
    .action-row {
      display: flex; gap: 0.6rem; margin-bottom: 1.5rem;
    }
    .action-row .btn { flex: 1; }

    /* ── Solution reveal ── */
    .solution-box {
      background: rgba(45,106,79,0.08);
      border: 1px solid rgba(45,106,79,0.25);
      border-radius: var(--r-md);
      padding: 0.875rem 1rem;
      font-size: 0.875rem; color: var(--correct);
      margin-bottom: 1rem;
      display: none;
    }
    .solution-box.show { display: block; }
    .solution-box strong {
      display: block; margin-bottom: 0.25rem;
      font-size: 0.8rem; letter-spacing: 0.05em; text-transform: uppercase;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; gap: 1rem;
      padding: 0.75rem 0;
      border-top: 1px solid var(--paper-deep);
      margin-bottom: 1rem;
    }
    .stats-bar__item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .stats-bar__value {
      font-family: var(--font-serif); font-size: 1.1rem;
      font-weight: 600; color: var(--ink);
    }
    .stats-bar__label {
      font-size: 0.65rem; color: var(--ink-faint);
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    /* ── Rank change toast ── */
    .rank-change {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; font-weight: 600;
      padding: 0.4rem 0.8rem; border-radius: 100px;
      animation: fadeUp 0.3s ease;
    }
    .rank-change--up   { background: rgba(45,106,79,0.1);  color: var(--correct); }
    .rank-change--down { background: rgba(139,26,26,0.1);  color: var(--wrong); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Bottom nav ── */
    .bottom-nav { display: flex; }

    /* ─────────────────────────────────────────────────────────────
       Mobile layout: keep board + response both on-screen at once.
       Strategy: give .board-container an explicit height capped by
       dvh so there is always room for the commentary below it.
       Switch SVG to height-driven (height:100%, width:auto) so it
       scales down proportionally instead of overflowing.
    ───────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      /* Tighten above-board chrome */
      .page-main            { padding-top: 0.5rem; }
      .stats-bar            { padding: 0.35rem 0; margin-bottom: 0.4rem; }
      .stats-bar__value     { font-size: 0.95rem; }
      .stats-bar__label     { font-size: 0.6rem; }
      .problem-header       { margin-bottom: 0.4rem; }

      /* Board: explicit height so content below is always visible.
         min() picks the smaller of:
           • full container width (board is square, so this is the natural size)
           • viewport height minus space for all surrounding chrome (~400 px)  */
      .board-container {
        height: min(calc(100vw - 2rem), calc(100dvh - 400px));
        min-height: 180px;   /* never collapse below usable size */
        margin-bottom: 0.4rem;
        display: flex; align-items: center; justify-content: center;
      }
      /* Height-driven SVG: fills container height, scales width to match
         (square viewBox means width == height automatically). */
      .board-container svg {
        height: 100% !important;
        width: auto !important;
        max-width: 100%;
        display: block;
        margin: 0 auto;
      }

      /* Tighten below-board chrome */
      .problem-description {
        padding: 0.45rem 0.75rem;
        font-size: 0.85rem; line-height: 1.45;
        margin-bottom: 0.4rem;
      }
      .attempts-row  { margin-bottom: 0.4rem; }
      .commentary-box {
        padding: 0.45rem 0.75rem;
        font-size: 0.85rem; line-height: 1.5;
        min-height: 0;
        margin-bottom: 0.4rem;
      }
      .solution-box  { padding: 0.45rem 0.75rem; margin-bottom: 0.4rem; }
      .action-row    { margin-bottom: 0.5rem; }
    }
  </style>
</head>
<body>

  <!-- Top nav -->
  <nav class="nav">
    <a href="home.html" class="nav__logo">
      <span class="nav__logo-stone"></span>
      Goxira
    </a>
    <div class="nav__links">
      <a href="problems.html" class="nav__link active">Problems</a>
      <a href="play.html"     class="nav__link">Play</a>
      <a href="review.html"   class="nav__link">Review</a>
      <a href="profile.html"  class="nav__link">Profile</a>
    </div>
  </nav>

  <main class="page-main">
    <div class="container">

      <!-- Stats bar -->
      <div class="stats-bar">
        <div class="stats-bar__item">
          <span class="stats-bar__value" id="stat-rank">—</span>
          <span class="stats-bar__label">Rank</span>
        </div>
        <div class="stats-bar__item">
          <span class="stats-bar__value" id="stat-solved">0</span>
          <span class="stats-bar__label">Solved</span>
        </div>
        <div class="stats-bar__item">
          <span class="stats-bar__value" id="stat-score">0</span>
          <span class="stats-bar__label">Points</span>
        </div>
        <div style="flex:1"></div>
        <div id="rank-change-wrap"></div>
      </div>

      <!-- Problem header -->
      <div class="problem-header">
        <div class="problem-meta">
          <span class="topic-badge" id="topic-badge">Loading…</span>
          <div class="to-play" id="to-play" style="display:none">
            <div class="to-play__stone" id="to-play-stone"></div>
            <span id="to-play-label">to play</span>
          </div>
        </div>
        <button class="btn btn--secondary" id="skip-btn" onclick="loadNewProblem()"
                style="padding:0.4rem 0.8rem; font-size:0.8rem;">
          Skip →
        </button>
      </div>

      <!-- Board -->
      <div class="board-container" id="board-container">
        <div class="board-loading" id="board-loading">
          <span class="loader" style="width:32px;height:32px;border-width:3px;color:var(--board-dark)"></span>
        </div>
      </div>

      <!-- Problem description -->
      <div class="problem-description" id="problem-description">
        Generating your problem…
      </div>

      <!-- Attempt pips -->
      <div class="attempts-row">
        <span class="attempts-label">Attempts:</span>
        <div class="attempt-pip" id="pip-1"></div>
        <div class="attempt-pip" id="pip-2"></div>
        <div class="attempt-pip" id="pip-3"></div>
      </div>

      <!-- Commentary -->
      <div class="commentary-box" id="commentary"></div>

      <!-- Solution -->
      <div class="solution-box" id="solution-box">
        <strong>Solution</strong>
        <span id="solution-text"></span>
      </div>

      <!-- Actions -->
      <div class="action-row">
        <button class="btn btn--secondary" id="hint-btn" onclick="getHint()">💡 Hint</button>
        <button class="btn btn--primary"   id="next-btn" onclick="loadNewProblem()"
                style="display:none">Next Problem →</button>
      </div>

    </div>
  </main>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <div class="bottom-nav__item" onclick="location.href='home.html'">
      <span class="bottom-nav__icon">⊞</span>Home
    </div>
    <div class="bottom-nav__item active" onclick="location.href='problems.html'">
      <span class="bottom-nav__icon">🧩</span>Problems
    </div>
    <div class="bottom-nav__item" onclick="location.href='play.html'">
      <span class="bottom-nav__icon">⚫</span>Play
    </div>
    <div class="bottom-nav__item" onclick="location.href='review.html'">
      <span class="bottom-nav__icon">🔍</span>Review
    </div>
    <div class="bottom-nav__item" onclick="location.href='profile.html'">
      <span class="bottom-nav__icon">◯</span>Profile
    </div>
  </nav>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    window.GOTUTOR_CONFIG = {
      supabaseUrl:     'https://humvrkmlvhzwoawoyslu.supabase.co',
      supabaseAnonKey: 'sb_publishable_dEQVVToEQh35MPrBEtKkmQ_om0ty8-r',
    };
  </script>
  <script src="supabase-client.js"></script>
  <script src="api.js"></script>
  <script src="board.js"></script>
  <script>
    let currentProblem = null;
    let board          = null;
    let attemptNumber  = 0;
    let hintsUsed      = 0;
    let solved         = false;
    let isMoving       = false;
    let userId         = null;
    let userProfile    = null;
    let totalSolved    = 0;


    // ── Init ────────────────────────────────────────────────────
    async function init() {
      const session = await Auth.getSession();
      if (!session) { location.href = 'auth.html'; return; }
      userId = session.user.id;
      userProfile = await UserDB.getProfile(userId);
      if (!userProfile) { location.href = 'auth.html'; return; }

      document.getElementById('stat-rank').textContent  = userProfile.current_rank;
      document.getElementById('stat-score').textContent = userProfile.rank_score;

      totalSolved = await UserDB.getSolvedCount(userId);
      document.getElementById('stat-solved').textContent = totalSolved;

      await loadNewProblem();
    }

    // ── Load a new problem ───────────────────────────────────────
    async function loadNewProblem() {
      attemptNumber = 0; hintsUsed = 0; solved = false; isMoving = false;
      currentProblem = null;

      document.getElementById('commentary').className   = 'commentary-box';
      document.getElementById('solution-box').className = 'solution-box';
      document.getElementById('next-btn').style.display = 'none';
      document.getElementById('hint-btn').style.display = 'inline-flex';
      document.getElementById('skip-btn').style.display = 'inline-flex';
      document.getElementById('board-loading').style.display = 'flex';
      document.getElementById('topic-badge').textContent = 'Loading…';
      document.getElementById('to-play').style.display = 'none';
      document.getElementById('problem-description').textContent = 'Loading problem…';
      resetPips();

      if (board) {
        const container = document.getElementById('board-container');
        const old = container.querySelector('svg');
        if (old) old.remove();
        board = null;
      }

      try {
        const res = await API.generateProblem(userProfile.current_rank, null, 9);
        currentProblem = res.problem;
        renderProblem(currentProblem);
      } catch(e) {
        console.error('Problem load error:', e);
        document.getElementById('problem-description').textContent =
          'Failed to load problem. Tap Skip to try again.';
        document.getElementById('board-loading').style.display = 'none';
      }
    }

    // ── Render problem on board ──────────────────────────────────
    function renderProblem(problem) {
      const size      = problem.boardSize || 19;
      const container = document.getElementById('board-container');

      board = Board.create(container, size, onMovePlayed);

      const stones = problem.setup?.stones || {};
      Object.entries(stones).forEach(([key, color]) => {
        const [c, r] = key.split(',').map(Number);
        board.placeSetup(c, r, color);
      });

      const toPlay = problem.setup?.toPlay || 'B';
      board.setColor(toPlay);

      document.getElementById('board-loading').style.display = 'none';
      document.getElementById('topic-badge').textContent = problem.topic || 'problem';
      document.getElementById('problem-description').textContent = problem.description;

      const stone = document.getElementById('to-play-stone');
      stone.className = `to-play__stone to-play__stone--${toPlay.toLowerCase()}`;
      document.getElementById('to-play-label').textContent =
        `${toPlay === 'B' ? 'Black' : 'White'} to play`;
      document.getElementById('to-play').style.display = 'flex';

      // ── Auto-crop board to stone region ──
      requestAnimationFrame(() => {
        cropViewBox(problem, size);
      });
    }

    // ── Crop SVG viewBox to the active stone region ──────────────
    // Board.js owns all touch/mouse interaction; this only adjusts the
    // visible area so problems render zoomed in on the relevant section.
    function cropViewBox(problem, boardSize) {
      const svg = document.querySelector('#board-container svg');
      if (!svg) return;

      const PADDING = 28;
      const CELL    = 36;

      // Make SVG fill container width responsively
      svg.setAttribute('width', '100%');
      svg.removeAttribute('height');
      svg.style.width  = '100%';
      svg.style.height = 'auto';
      svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

      const stoneKeys = Object.keys(problem.setup?.stones || {});
      if (!stoneKeys.length) return;

      // Collect all relevant grid coordinates (stones + solution move)
      const allCols = stoneKeys.map(k => parseInt(k.split(',')[0]));
      const allRows = stoneKeys.map(k => parseInt(k.split(',')[1]));
      if (problem.solution?.move) {
        allCols.push(problem.solution.move[0]);
        allRows.push(problem.solution.move[1]);
      }

      // 2-cell padding around the bounding box, clamped to board edges
      const PAD    = 2;
      const minCol = Math.max(0, Math.min(...allCols) - PAD);
      const maxCol = Math.min(boardSize - 1, Math.max(...allCols) + PAD);
      const minRow = Math.max(0, Math.min(...allRows) - PAD);
      const maxRow = Math.min(boardSize - 1, Math.max(...allRows) + PAD);

      const margin = CELL * 0.75;
      const vbX = PADDING + minCol * CELL - margin;
      const vbY = PADDING + minRow * CELL - margin;
      const vbW = (maxCol - minCol) * CELL + margin * 2 + CELL;
      const vbH = (maxRow - minRow) * CELL + margin * 2 + CELL;
      svg.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
    }

    // ── Handle user move ─────────────────────────────────────────
    async function onMovePlayed(col, row) {
      if (solved || !currentProblem || isMoving) return;
      isMoving = true;
      attemptNumber++;
      const thisAttempt = attemptNumber; // capture before any await
      updatePip(thisAttempt, 'pending');

      board.setInteractive(false);
      document.getElementById('hint-btn').disabled = true;

      try {
        const res = await API.evaluateMove(
          currentProblem, col, row, thisAttempt, userProfile.current_rank
        );

        if (res.correct) {
          solved = true;
          board.place(col, row, board.getColor());
          board.addMarker(col, row, 'triangle');
          updatePip(thisAttempt, 'correct');
          showCommentary(res.message, 'correct');
          await onSolved();
        } else {
          updatePip(thisAttempt, 'wrong');
          showCommentary(res.message, 'wrong');

          if (res.solution) {
            showSolution(res.solution);
            await onFailed();
          } else {
            board.setInteractive(true);
          }
        }
      } catch(e) {
        console.error('Evaluate error:', e);
        showCommentary('Something went wrong. Try again.', '');
        board.setInteractive(true);
      }

      document.getElementById('hint-btn').disabled = false;
      isMoving = false;
    }

    // ── Hint ─────────────────────────────────────────────────────
    async function getHint() {
      if (!currentProblem || solved) return;
      hintsUsed++;
      const hint = currentProblem.hint || 'Look carefully at the liberties of each group.';
      showCommentary(`💡 ${hint}`, '');
    }

    // ── Solved / Failed ──────────────────────────────────────────
    async function onSolved() {
      board.setInteractive(false);
      document.getElementById('hint-btn').style.display = 'none';
      document.getElementById('skip-btn').style.display = 'none';
      document.getElementById('next-btn').style.display = 'inline-flex';

      totalSolved++;
      document.getElementById('stat-solved').textContent = totalSolved;

      const points = Rank.pointsForProblem(true, hintsUsed, currentProblem.difficulty || 1);
      await updateRankScore(points);
      await UserDB.logAttempt(
        userId, currentProblem.id, currentProblem.boardSize || 19,
        currentProblem.topic, true, hintsUsed
      );
    }

    async function onFailed() {
      board.setInteractive(false);
      document.getElementById('hint-btn').style.display = 'none';
      document.getElementById('skip-btn').style.display = 'none';
      document.getElementById('next-btn').style.display = 'inline-flex';

      const points = Rank.pointsForProblem(false, 0, currentProblem.difficulty || 1);
      await updateRankScore(points);
      await UserDB.logAttempt(
        userId, currentProblem.id, currentProblem.boardSize || 19,
        currentProblem.topic, false, hintsUsed
      );
    }

    async function updateRankScore(points) {
      const newScore = Math.max(0, (userProfile.rank_score || 0) + points);
      const newRank  = Rank.scoreToRank(newScore);

      userProfile.rank_score   = newScore;
      userProfile.current_rank = newRank;

      document.getElementById('stat-score').textContent = newScore;
      document.getElementById('stat-rank').textContent  = newRank;

      const wrap = document.getElementById('rank-change-wrap');
      const div  = document.createElement('div');
      div.className   = `rank-change rank-change--${points >= 0 ? 'up' : 'down'}`;
      div.textContent = `${points >= 0 ? '+' : ''}${points} pts`;
      wrap.innerHTML  = '';
      wrap.appendChild(div);

      await UserDB.updateRank(userId, newRank, newScore);
    }

    // ── UI helpers ───────────────────────────────────────────────
    function showCommentary(text, type) {
      const box = document.getElementById('commentary');
      box.textContent = text;
      box.className   = `commentary-box show${type ? ' ' + type : ''}`;
      // Smoothly bring the result into view — critical on small phones where
      // the board fills much of the screen.
      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showSolution(solution) {
      document.getElementById('solution-text').textContent = solution.explanation;
      document.getElementById('solution-box').className = 'solution-box show';
      if (solution.move) {
        board.addMarker(solution.move[0], solution.move[1], 'flag');
      }
    }

    function resetPips() {
      [1,2,3].forEach(i => {
        document.getElementById(`pip-${i}`).className = 'attempt-pip';
      });
    }

    function updatePip(n, state) {
      const pip = document.getElementById(`pip-${n}`);
      if (!pip) return;
      pip.className = `attempt-pip attempt-pip--${
        state === 'correct' ? 'correct' : state === 'wrong' ? 'wrong' : ''
      }`;
    }

    init();
  </script>
</body>
</html>
