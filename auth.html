<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Igo</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100dvh;
      display: flex; flex-direction: column;
      background: var(--paper);
    }

    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: stretch;
    }

    /* Left panel — decorative */
    .auth-art {
      flex: 1;
      background: var(--ink);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem;
      position: relative; overflow: hidden;
    }
    .auth-art__board { width: 100%; max-width: 320px; }
    .auth-art__quote {
      margin-top: 2.5rem; max-width: 280px; text-align: center;
      color: rgba(245,240,232,0.5);
      font-family: var(--font-serif); font-style: italic;
      font-size: 0.9rem; line-height: 1.7;
    }
    .auth-art__attr {
      margin-top: 0.5rem; color: rgba(245,240,232,0.3);
      font-size: 0.75rem; text-align: center;
    }

    /* Right panel — form */
    .auth-form-panel {
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; justify-content: center;
      padding: 3rem 2.5rem;
    }

    .auth-logo {
      display: flex; align-items: center; gap: 0.5rem;
      font-family: var(--font-serif); font-size: 1.3rem; color: var(--ink);
      margin-bottom: 2.5rem; text-decoration: none;
    }
    .auth-logo__stone {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--ink);
      box-shadow: 1px 1px 0 rgba(255,255,255,0.25) inset;
    }

    .auth-tabs {
      display: flex; gap: 0; margin-bottom: 2rem;
      border-bottom: 2px solid var(--paper-deep);
    }
    .auth-tab {
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem; font-weight: 500;
      color: var(--ink-faint); cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.15s;
      background: none; border-top: none; border-left: none; border-right: none;
      font-family: var(--font-sans);
    }
    .auth-tab.active {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .google-btn {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: white; color: var(--ink);
      border: 1.5px solid var(--paper-deep);
      border-radius: var(--r-md);
      font-size: 0.9rem; font-weight: 500; cursor: pointer;
      transition: all 0.15s; font-family: var(--font-sans);
    }
    .google-btn:hover { border-color: var(--ink); background: var(--paper-warm); }
    .google-icon { width: 18px; height: 18px; }

    .auth-err {
      background: rgba(139,26,26,0.08);
      border: 1px solid rgba(139,26,26,0.2);
      border-radius: var(--r-md);
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem; color: var(--wrong);
      margin-bottom: 1rem; display: none;
    }
    .auth-err.show { display: block; }

    .auth-terms {
      font-size: 0.75rem; color: var(--ink-faint);
      text-align: center; margin-top: 1.25rem;
    }

    .confirm-msg {
      text-align: center; padding: 2rem 0; display: none;
    }
    .confirm-msg.show { display: block; }
    .confirm-msg__icon { font-size: 2.5rem; margin-bottom: 1rem; }

    @media (max-width: 700px) {
      .auth-art { display: none; }
      .auth-form-panel {
        max-width: 100%; padding: 2rem 1.5rem;
        justify-content: flex-start; padding-top: 3rem;
      }
    }
  </style>
</head>
<body>

<div class="auth-wrap">

  <!-- Decorative left panel (desktop only) -->
  <div class="auth-art">
    <div class="auth-art__board" id="art-board"></div>
    <p class="auth-art__quote">
      "Go is to Western chess what philosophy is to double-entry bookkeeping."
    </p>
    <p class="auth-art__attr">— Piers Anthony</p>
  </div>

  <!-- Form panel -->
  <div class="auth-form-panel">
    <a href="index.html" class="auth-logo">
      <span class="auth-logo__stone"></span>
      Igo
    </a>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" data-tab="signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Sign In Panel -->
    <div class="auth-panel active" id="panel-login">
      <div class="auth-err" id="login-err"></div>

      <button class="google-btn" onclick="signInGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider">or</div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn--primary btn--full" id="login-btn" onclick="signIn()">Sign In</button>
      <p class="auth-terms" style="margin-top:1rem;">
        <a href="#" style="color:var(--ink-faint)">Forgot password?</a>
      </p>
    </div>

    <!-- Sign Up Panel -->
    <div class="auth-panel" id="panel-signup">
      <div class="auth-err" id="signup-err"></div>

      <div class="confirm-msg" id="confirm-msg">
        <div class="confirm-msg__icon">✉️</div>
        <h3>Check your email</h3>
        <p style="margin-top:0.5rem; font-size:0.9rem;">
          We sent a confirmation link to <strong id="confirm-email"></strong>.<br>
          Click it to activate your account.
        </p>
      </div>

      <div id="signup-form-fields">
        <button class="google-btn" onclick="signInGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign up with Google
        </button>

        <div class="divider">or</div>

        <div class="form-group">
          <label class="form-label">Display Name</label>
          <input class="form-input" type="text" id="signup-name" placeholder="Your name" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="signup-email" placeholder="you@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="signup-password" placeholder="8+ characters" autocomplete="new-password">
        </div>
        <button class="btn btn--primary btn--full" id="signup-btn" onclick="signUp()">Create Account</button>
        <p class="auth-terms">
          By signing up you agree to our terms. It's free, no credit card needed.
        </p>
      </div>
    </div>

  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="board.js"></script>
<script>
  // ── Config ── Replace with your actual Supabase values
  window.GOTUTOR_CONFIG = {
    supabaseUrl:     'https://humvrkmlvhzwoawoyslu.supabase.co',
    supabaseAnonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1bXZya21sdmh6d29hd295c2x1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODIyMzQsImV4cCI6MjA4ODI1ODIzNH0.4pp8gMmeW0B9YI-LQBNL8kgu2P-QanDCC6T9a83vdEM',
  };
</script>
<script src="supabase-client.js"></script>
<script>
  // ── Decorative board ──
  const artBoard = Board.create(document.getElementById('art-board'), 9, null);
  artBoard.setInteractive(false);
  const demoMoves = [
    [4,4,'B'],[3,3,'W'],[5,3,'B'],[3,5,'W'],
    [5,5,'B'],[4,3,'W'],[3,4,'B'],[5,4,'W'],
    [4,5,'B'],[6,4,'W'],[2,4,'B']
  ];
  demoMoves.forEach(([c,r,col]) => artBoard.place(c, r, col));

  // ── Tab switching ──
  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.auth-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
  }

  // Read URL param for initial tab
  const params = new URLSearchParams(location.search);
  if (params.get('mode') === 'login') switchTab('login');

  // ── Auth actions ──
  async function signInGoogle() {
    try { await Auth.signInWithGoogle(); }
    catch(e) { showErr('login-err', e.message); }
  }

  async function signIn() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;
    if (!email || !pass) { showErr('login-err', 'Please fill in all fields.'); return; }
    const btn = document.getElementById('login-btn');
    setLoading(btn, true);
    try {
      await Auth.signIn(email, pass);
      location.href = '/home.html';
    } catch(e) {
      showErr('login-err', e.message);
      setLoading(btn, false);
    }
  }

  async function signUp() {
    const name  = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pass  = document.getElementById('signup-password').value;
    if (!name || !email || !pass) { showErr('signup-err', 'Please fill in all fields.'); return; }
    if (pass.length < 8) { showErr('signup-err', 'Password must be at least 8 characters.'); return; }
    const btn = document.getElementById('signup-btn');
    setLoading(btn, true);
    try {
      await Auth.signUp(email, pass, name);
      document.getElementById('confirm-email').textContent = email;
      document.getElementById('signup-form-fields').style.display = 'none';
      document.getElementById('confirm-msg').classList.add('show');
    } catch(e) {
      showErr('signup-err', e.message);
      setLoading(btn, false);
    }
  }

  // Handle OAuth redirect
  Auth.onAuthChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      // Create profile if new user
      const profile = await UserDB.getProfile(session.user.id);
      if (!profile) {
        const name = session.user.user_metadata?.display_name
                  || session.user.user_metadata?.full_name
                  || session.user.email.split('@')[0];
        await UserDB.createProfile(session.user.id, name);
      }
      location.href = profile?.assessment_done ? '/home.html' : '/assess.html';
    }
  });

  // ── Helpers ──
  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 5000);
  }
  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="loader"></span>' : btn.dataset.label || btn.textContent;
    if (!loading && !btn.dataset.label) btn.dataset.label = btn.textContent;
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const activePanel = document.querySelector('.auth-panel.active').id;
    if (activePanel === 'panel-login') signIn();
    else signUp();
  });
</script>
</body>
</html>
