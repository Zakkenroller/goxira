<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessment — Goxira</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100dvh;
      display: flex; flex-direction: column;
      background: var(--paper);
    }

    .assess-wrap {
      flex: 1; display: flex; flex-direction: column;
      max-width: 620px; margin: 0 auto; width: 100%;
      padding: 0 1rem;
    }

    /* ── Header ── */
    .assess-header {
      padding: 2rem 0 1.5rem;
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }
    .assess-header__stone {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--ink);
      margin: 0 auto 1rem;
      box-shadow: 2px 2px 0 rgba(255,255,255,0.2) inset, var(--shadow-md);
      position: relative;
    }
    .assess-header__stone::after {
      content: '';
      position: absolute; top: 20%; left: 20%;
      width: 30%; height: 20%;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      transform: rotate(-30deg);
    }
    .assess-header h1 { font-size: 1.4rem; margin-bottom: 0.4rem; }
    .assess-header p  { font-size: 0.875rem; color: var(--ink-faint); }

    /* ── Progress dots ── */
    .progress-dots {
      display: flex; justify-content: center; gap: 6px;
      margin: 0.5rem 0 1.5rem;
    }
    .progress-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--paper-deep);
      transition: background 0.3s;
    }
    .progress-dot.active   { background: var(--ink); }
    .progress-dot.complete { background: var(--correct); }

    /* ── Chat thread ── */
    .chat-thread {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 1rem;
      padding-bottom: 1rem;
    }

    .chat-bubble {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: var(--r-lg);
      font-size: 0.925rem; line-height: 1.6;
      animation: bubbleIn 0.3s ease both;
    }
    .chat-bubble--claude {
      background: white;
      border: 1px solid var(--paper-deep);
      border-bottom-left-radius: var(--r-sm);
      align-self: flex-start;
      box-shadow: var(--shadow-sm);
      font-family: var(--font-serif);
      color: var(--ink-light);
    }
    .chat-bubble--user {
      background: var(--ink);
      color: var(--paper);
      border-bottom-right-radius: var(--r-sm);
      align-self: flex-end;
    }
    .chat-bubble--system {
      align-self: center;
      background: rgba(45,106,79,0.1);
      border: 1px solid rgba(45,106,79,0.25);
      color: var(--correct);
      font-size: 0.8rem; font-weight: 500;
      padding: 0.4rem 0.9rem;
      border-radius: 100px;
      text-align: center;
      max-width: 100%;
    }

    .typing-indicator {
      display: flex; gap: 4px; align-items: center;
      padding: 0.75rem 1rem;
      background: white; border: 1px solid var(--paper-deep);
      border-radius: var(--r-lg); border-bottom-left-radius: var(--r-sm);
      align-self: flex-start; box-shadow: var(--shadow-sm);
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ink-faint);
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* ── Input area ── */
    .input-area {
      padding: 1rem 0 max(1rem, env(safe-area-inset-bottom));
      border-top: 1px solid var(--paper-deep);
      background: var(--paper);
    }
    .input-row {
      display: flex; gap: 0.5rem; align-items: flex-end;
    }
    .input-field {
      flex: 1;
      padding: 0.7rem 1rem;
      border: 1.5px solid var(--paper-deep);
      border-radius: var(--r-lg);
      font-family: var(--font-sans); font-size: 0.95rem;
      color: var(--ink); background: white;
      outline: none; resize: none;
      min-height: 44px; max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .input-field:focus { border-color: var(--ink); }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--ink); color: var(--paper);
      border: none; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .send-btn:hover { background: var(--ink-light); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Rank reveal card ── */
    .rank-reveal {
      background: var(--ink);
      border-radius: var(--r-lg);
      padding: 2rem;
      text-align: center;
      color: var(--paper);
      align-self: stretch;
      animation: rankReveal 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .rank-reveal__label {
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      opacity: 0.5; margin-bottom: 0.5rem;
    }
    .rank-reveal__rank {
      font-family: var(--font-serif);
      font-size: 2.5rem; font-weight: 600;
      color: var(--paper);
      margin-bottom: 0.5rem;
    }
    .rank-reveal__summary {
      font-size: 0.875rem; opacity: 0.7; line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }
    @keyframes rankReveal {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="assess-wrap">

  <!-- Header -->
  <div class="assess-header">
    <div class="assess-header__stone"></div>
    <h1>Let's find your level</h1>
    <p>A short conversation — 5 to 8 questions. No wrong answers.</p>
  </div>

  <!-- Progress -->
  <div class="progress-dots" id="progress-dots">
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
  </div>

  <!-- Chat thread -->
  <div class="chat-thread" id="chat-thread"></div>

  <!-- Input -->
  <div class="input-area" id="input-area">
    <div class="input-row">
      <textarea
        class="input-field"
        id="user-input"
        placeholder="Type your answer…"
        rows="1"
        maxlength="500"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
        ↑
      </button>
    </div>
  </div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  window.GOTUTOR_CONFIG = {
    supabaseUrl:     'REPLACE_WITH_YOUR_SUPABASE_URL',
    supabaseAnonKey: 'REPLACE_WITH_YOUR_SUPABASE_ANON_KEY',
  };
</script>
<script src="supabase-client.js"></script>
<script src="api.js"></script>
<script>
  let messages      = [];
  let questionCount = 0;
  let isWaiting     = false;
  let userId        = null;
  let userContext   = '';

  // ── Init ────────────────────────────────────────────────────
  async function init() {
    const session = await Auth.getSession();
    if (!session) { location.href = '/auth.html'; return; }
    userId = session.user.id;

    // Check if already assessed
    const profile = await UserDB.getProfile(userId);
    if (profile?.assessment_done) { location.href = '/home.html'; return; }

    // Get display name for personalization
    userContext = profile?.display_name || session.user.email;

    // Start conversation
    await askClaude([]);
  }

  // ── Send message ─────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text  = input.value.trim();
    if (!text || isWaiting) return;

    input.value = '';
    input.style.height = 'auto';
    appendBubble(text, 'user');
    messages.push({ role: 'user', content: text });

    questionCount++;
    updateProgress(questionCount);
    await askClaude(messages);
  }

  // ── Call assessment API ──────────────────────────────────────
  async function askClaude(msgs) {
    isWaiting = true;
    document.getElementById('send-btn').disabled = true;

    const typing = showTyping();
    try {
      const res = await API.assess(msgs, userContext);
      removeTyping(typing);

      if (res.type === 'complete') {
        // Show final message if any
        if (res.message) appendBubble(res.message, 'claude');
        await completeAssessment(res.result);
      } else {
        appendBubble(res.message, 'claude');
        messages.push({ role: 'assistant', content: res.message });
      }
    } catch(e) {
      removeTyping(typing);
      appendBubble('Sorry, something went wrong. Please refresh and try again.', 'claude');
      console.error(e);
    }

    isWaiting = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  }

  // ── Assessment complete ──────────────────────────────────────
  async function completeAssessment(result) {
    // Hide input
    document.getElementById('input-area').style.display = 'none';

    // Mark all dots complete
    document.querySelectorAll('.progress-dot').forEach(d => d.classList.add('complete'));

    // System message
    appendBubble('Assessment complete!', 'system');

    // Rank reveal card
    const thread = document.getElementById('chat-thread');
    const card   = document.createElement('div');
    card.className = 'rank-reveal';
    card.innerHTML = `
      <p class="rank-reveal__label">Your Starting Rank</p>
      <p class="rank-reveal__rank">${result.rank}</p>
      <p class="rank-reveal__summary">${result.summary}</p>
      <button class="btn btn--accent btn--full btn--lg" onclick="goToDashboard()">
        Start Learning →
      </button>
    `;
    thread.appendChild(card);
    scrollThread();

    // Save to Supabase
    try {
      await UserDB.updateRank(userId, result.rank, result.rankScore);
      await UserDB.markAssessmentDone(userId);
    } catch(e) {
      console.error('Failed to save rank:', e);
    }
  }

  function goToDashboard() { location.href = '/home.html'; }

  // ── UI helpers ───────────────────────────────────────────────
  function appendBubble(text, type) {
    const thread = document.getElementById('chat-thread');
    const div = document.createElement('div');
    div.className = `chat-bubble chat-bubble--${type}`;
    div.textContent = text;
    thread.appendChild(div);
    scrollThread();
    return div;
  }

  function showTyping() {
    const thread = document.getElementById('chat-thread');
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    thread.appendChild(div);
    scrollThread();
    return div;
  }

  function removeTyping(el) { el?.remove(); }

  function scrollThread() {
    const thread = document.getElementById('chat-thread');
    setTimeout(() => thread.scrollTo({ top: thread.scrollHeight, behavior: 'smooth' }), 50);
  }

  function updateProgress(count) {
    const dots = document.querySelectorAll('.progress-dot');
    dots.forEach((d, i) => {
      d.classList.toggle('complete', i < count - 1);
      d.classList.toggle('active',   i === count - 1);
    });
  }

  // ── Auto-resize textarea ─────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const ta = document.getElementById('user-input');
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    });
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    init();
  });
</script>
</body>
</html>
