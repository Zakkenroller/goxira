# KataGo analysis engine config
# Used by katago-service/server.js
# Full documentation: https://github.com/lightvector/KataGo/blob/master/docs/Analysis_Engine.md

# Report winrates from Black's perspective (consistent with goxira conventions)
reportAnalysisWinratesAs = BLACK

# Allow the engine to use all available CPU threads
# On a CX22 (2 vCPUs), 2 threads is optimal
numAnalysisThreads = 2

# Number of search threads per query (keep low for fast response on cheap hardware)
numSearchThreads = 2
