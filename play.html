<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play — Goxira</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page-main { padding-top: 1.25rem; }

    .setup-screen {
      max-width: 400px; margin: 0 auto; padding: 1rem 0;
    }
    .setup-screen h2 { margin-bottom: 1.5rem; }

    .option-group { margin-bottom: 1.5rem; }
    .option-group__label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.6rem;
    }
    .option-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .option-pill {
      padding: 0.5rem 1.1rem;
      border: 1.5px solid var(--paper-deep);
      border-radius: 100px;
      font-size: 0.875rem; font-weight: 500; color: var(--ink-light);
      cursor: pointer; transition: all 0.15s; background: white;
      font-family: var(--font-sans);
    }
    .option-pill.selected { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    .color-options { display: flex; gap: 0.75rem; }
    .color-option {
      flex: 1; padding: 0.875rem;
      border: 1.5px solid var(--paper-deep);
      border-radius: var(--r-md);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      cursor: pointer; transition: all 0.15s; background: white;
    }
    .color-option.selected { border-color: var(--ink); background: var(--paper-warm); }
    .color-option__stone { width: 36px; height: 36px; border-radius: 50%; }
    .color-option__stone--b { background: var(--ink); box-shadow: 2px 2px 0 rgba(255,255,255,0.15) inset, var(--shadow-sm); }
    .color-option__stone--w { background: white; border: 2px solid var(--paper-deep); box-shadow: var(--shadow-sm); }
    .color-option__label { font-size: 0.8rem; font-weight: 500; color: var(--ink); }

    .game-screen { display: none; }

    .game-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.875rem;
    }
    .game-info { display: flex; align-items: center; gap: 0.75rem; }
    .player-tag {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.8rem; font-weight: 500;
      padding: 0.3rem 0.7rem;
      border-radius: 100px;
      border: 1.5px solid var(--paper-deep);
      background: white;
    }
    .player-tag__stone { width: 12px; height: 12px; border-radius: 50%; }
    .player-tag__stone--b { background: var(--ink); }
    .player-tag__stone--w { background: white; border: 1.5px solid var(--ink-faint); }
    .player-tag.active { border-color: var(--ink); background: var(--ink); color: var(--paper); }
    .player-tag.active .player-tag__stone--w { border-color: rgba(255,255,255,0.5); }

    .move-count { font-size: 0.75rem; color: var(--ink-faint); font-family: var(--font-serif); }

    .board-container {
      background: var(--board);
      border-radius: var(--r-lg);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      margin-bottom: 0.875rem;
      position: relative;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    /* SVG fills container width on desktop */
    .board-container svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Mobile: keep board + commentary both on-screen ── */
    @media (max-width: 640px) {
      .board-container {
        height: min(calc(100vw - 2rem), calc(100dvh - 400px));
        min-height: 180px;
        margin-bottom: 0.5rem;
        display: flex; align-items: center; justify-content: center;
      }
      /* Switch to height-driven so the square board scales down correctly */
      .board-container svg {
        height: 100% !important;
        width: auto !important;
        max-width: 100%;
        display: block;
        margin: 0 auto;
      }
      .game-header       { margin-bottom: 0.5rem; }
      .move-commentary   {
        padding: 0.45rem 0.75rem;
        font-size: 0.85rem; line-height: 1.5;
        min-height: 0;
        margin-bottom: 0.5rem;
      }
      .claude-thinking   { margin-bottom: 0.5rem; padding: 0.4rem 0.75rem; }
      .game-controls     { margin-bottom: 0.4rem; }
      .game-controls .btn { font-size: 0.75rem; padding: 0.4rem 0.3rem; }
    }

    .claude-thinking {
      display: none;
      align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.875rem;
      background: var(--paper-warm);
      border: 1px solid var(--paper-deep);
      border-radius: var(--r-md);
      font-size: 0.825rem; color: var(--ink-faint);
      font-family: var(--font-serif); font-style: italic;
      margin-bottom: 0.875rem;
    }
    .claude-thinking.show { display: flex; }

    .move-commentary {
      background: white;
      border: 1px solid var(--paper-deep);
      border-left: 3px solid var(--board-dark);
      border-radius: var(--r-md);
      padding: 0.75rem 1rem;
      font-family: var(--font-serif);
      font-size: 0.875rem; line-height: 1.65;
      color: var(--ink-light);
      margin-bottom: 0.875rem;
      min-height: 48px;
    }

    .game-controls { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; }
    .game-controls .btn { flex: 1; font-size: 0.8rem; padding: 0.5rem 0.4rem; }

    .game-over-card {
      background: var(--ink); color: var(--paper);
      border-radius: var(--r-lg); padding: 1.5rem;
      text-align: center; margin-bottom: 1rem; display: none;
    }
    .game-over-card.show { display: block; }
    .game-over-card h3 { color: var(--paper); font-size: 1.2rem; margin-bottom: 0.5rem; }
    .game-over-card p  { color: rgba(245,240,232,0.7); font-size: 0.875rem; margin-bottom: 1.25rem; }

    .bottom-nav { display: flex; }
  </style>
</head>

          <div class="color-options">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    window.GOTUTOR_CONFIG = {
      supabaseUrl:     'https://humvrkmlvhzwoawoyslu.supabase.co',
      supabaseAnonKey: 'sb_publishable_dEQVVToEQh35MPrBEtKkmQ_om0ty8-r',
    };
  </script>
  <script src="supabase-client.js"></script>
  <script src="api.js"></script>
  <script src="board.js"></script>
  <script>
    let board             = null;
    let boardSize         = 9;
    let playerColor       = 'B';
    let claudeColor       = 'W';
    let difficulty        = 'match';
    let moveNumber        = 0;
    let sgfMoves          = [];
    let gameOver          = false;
    let consecutivePasses = 0;
    let userId            = null;
    let userProfile       = null;
    let savedGameId       = null;

    async function init() {
      const session = await Auth.getSession();
      if (!session) { location.href = 'auth.html'; return; }
      userId      = session.user.id;
      userProfile = await UserDB.getProfile(userId);
    }

    function selectSize(el) {
      document.querySelectorAll('[data-size]').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      boardSize = parseInt(el.dataset.size);
    }
    function selectColor(el) {
      document.querySelectorAll('[data-color]').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      playerColor = el.dataset.color;
      claudeColor = playerColor === 'B' ? 'W' : 'B';
    }
    function selectDiff(el) {
      document.querySelectorAll('[data-diff]').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      difficulty = el.dataset.diff;
    }

    async function startGame() {
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('game-screen').style.display  = 'block';

      const pStone = document.getElementById('tag-player-stone');
      const cStone = document.getElementById('tag-claude-stone');
      pStone.className = `player-tag__stone player-tag__stone--${playerColor.toLowerCase()}`;
      cStone.className = `player-tag__stone player-tag__stone--${claudeColor.toLowerCase()}`;
      document.getElementById('commentary-color').textContent = playerColor === 'B' ? 'Black' : 'White';

      board = Board.create(document.getElementById('board-container'), boardSize, onPlayerMove);
      board.setColor('B');
      updateTurnIndicator('B');

      if (playerColor === 'W') await claudeMove();
    }

    // ── Legal move helpers ────────────────────────────────────────
    function getNeighbors(col, row) {
      return [[col-1,row],[col+1,row],[col,row-1],[col,row+1]]
        .filter(([c,r]) => c >= 0 && c < boardSize && r >= 0 && r < boardSize);
    }

    function getGroup(col, row, stones) {
      const color = stones[`${col},${row}`];
      if (!color) return [];
      const group = [], visited = new Set(), queue = [[col, row]];
      while (queue.length) {
        const [c, r] = queue.pop();
        const key = `${c},${r}`;
        if (visited.has(key)) continue;
        visited.add(key);
        if (stones[key] !== color) continue;
        group.push([c, r]);
        getNeighbors(c, r).forEach(([nc, nr]) => { if (!visited.has(`${nc},${nr}`)) queue.push([nc, nr]); });
      }
      return group;
    }

    function getLiberties(group, stones) {
      const libs = new Set();
      group.forEach(([c, r]) => {
        getNeighbors(c, r).forEach(([nc, nr]) => { if (!stones[`${nc},${nr}`]) libs.add(`${nc},${nr}`); });
      });
      return libs.size;
    }

    function isLegalMove(col, row, color, stones) {
      if (stones[`${col},${row}`]) return false;
      const opponent   = color === 'B' ? 'W' : 'B';
      const testStones = { ...stones, [`${col},${row}`]: color };
      // Legal if captures opponent
      for (const [nc, nr] of getNeighbors(col, row)) {
        if (testStones[`${nc},${nr}`] === opponent) {
          if (getLiberties(getGroup(nc, nr, testStones), testStones) === 0) return true;
        }
      }
      // Legal if own group has liberties
      return getLiberties(getGroup(col, row, testStones), testStones) > 0;
    }

    function hasLegalMoves(color) {
      const stones = board.getStones();
      for (let c = 0; c < boardSize; c++)
        for (let r = 0; r < boardSize; r++)
          if (isLegalMove(c, r, color, stones)) return true;
      return false;
    }

    function isBoardEffectivelyOver() {
      const stones = board.getStones();
      const filled = Object.keys(stones).length;
      if (filled / (boardSize * boardSize) >= 0.85) return true;
      if (!hasLegalMoves(playerColor) && !hasLegalMoves(claudeColor)) return true;
      return false;
    }

    // ── Player move ──────────────────────────────────────────────
    async function onPlayerMove(col, row) {
      if (gameOver) return;
      consecutivePasses = 0;

      const snapshot = { stones: board.getStones(), sgfLength: sgfMoves.length, moveNumber };

      board.place(col, row, playerColor);
      moveNumber++;
      addSGFMove(playerColor, col, row);
      updateMoveCount();
      updateTurnIndicator(claudeColor);
      setCommentary('…');
      board.setInteractive(false);
      document.getElementById('undo-btn').disabled = true;

      await claudeMove(snapshot);
    }

    // ── Goxira move ──────────────────────────────────────────────
    async function claudeMove(snapshot = null) {
      if (gameOver) return;

      // No legal moves — auto pass
      if (!hasLegalMoves(claudeColor)) {
        consecutivePasses++;
        addSGFPass(claudeColor);
        setCommentary('Goxira has no legal moves — passing.');
        if (consecutivePasses >= 2 || isBoardEffectivelyOver()) { endGame('double-pass'); return; }
        updateTurnIndicator(playerColor);
        board.setColor(playerColor);
        board.setInteractive(true);
        if (snapshot) enableUndo(snapshot);
        return;
      }

      document.getElementById('claude-thinking').classList.add('show');

      try {
        // Prefer KataGo for move generation; fall back to Claude if unavailable
        const movePayload = JSON.stringify({
          sgf: buildSGF(), color: claudeColor, boardSize,
          rank: getEffectiveRank(), currentStones: board.getStones(),
        });
        let res = await fetch('/.netlify/functions/katago-move', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: movePayload,
        }).then(r => r.ok ? r.json() : null).catch(() => null);
        if (!res?.move) {
          res = await fetch('/.netlify/functions/claude-move', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: movePayload,
          }).then(r => r.json());
        }

        const move = res.move;
        document.getElementById('claude-thinking').classList.remove('show');

        if (move.col === -1 && move.row === -1) {
          consecutivePasses++;
          addSGFPass(claudeColor);
          setCommentary(`Goxira passes. ${move.thinking || ''}`);
          if (consecutivePasses >= 2 || isBoardEffectivelyOver()) { endGame('double-pass'); return; }
        } else {
          const stones = board.getStones();
          if (!isLegalMove(move.col, move.row, claudeColor, stones)) {
            // Illegal — force pass
            consecutivePasses++;
            addSGFPass(claudeColor);
            setCommentary('Goxira passes.');
            if (consecutivePasses >= 2 || isBoardEffectivelyOver()) { endGame('double-pass'); return; }
          } else {
            consecutivePasses = 0;
            board.place(move.col, move.row, claudeColor);
            moveNumber++;
            addSGFMove(claudeColor, move.col, move.row);
            updateMoveCount();
            setCommentary(move.thinking || 'Goxira played.');
          }
        }

        if (isBoardEffectivelyOver()) { endGame('double-pass'); return; }

        updateTurnIndicator(playerColor);
        board.setColor(playerColor);
        board.setInteractive(true);
        if (snapshot) enableUndo(snapshot);

      } catch(e) {
        console.error('Goxira move error:', e);
        document.getElementById('claude-thinking').classList.remove('show');
        setCommentary('Goxira is regrouping — your turn.');
        board.setInteractive(true);
        if (snapshot) enableUndo(snapshot);
      }
    }

    // ── Undo ─────────────────────────────────────────────────────
    function enableUndo(snapshot) {
      const btn = document.getElementById('undo-btn');
      btn.disabled = false;
      btn._snapshot = snapshot;
    }

    function undoMove() {
      const btn  = document.getElementById('undo-btn');
      const snap = btn._snapshot;
      if (!snap || gameOver) return;
      board.setState(snap.stones);
      board.setColor(playerColor);
      sgfMoves   = sgfMoves.slice(0, snap.sgfLength);
      moveNumber = snap.moveNumber;
      consecutivePasses = 0;
      updateMoveCount();
      updateTurnIndicator(playerColor);
      board.setInteractive(true);
      btn.disabled  = true;
      btn._snapshot = null;
      setCommentary('Move taken back. Your turn.');
    }

    // ── Pass / Resign ─────────────────────────────────────────────
    async function passTurn() {
      if (gameOver) return;
      consecutivePasses++;
      addSGFPass(playerColor);
      moveNumber++;
      updateMoveCount();
      setCommentary('You passed.');
      document.getElementById('undo-btn').disabled = true;
      if (consecutivePasses >= 2 || isBoardEffectivelyOver()) { endGame('double-pass'); return; }
      board.setInteractive(false);
      updateTurnIndicator(claudeColor);
      await claudeMove();
    }

    function resignGame() {
      if (gameOver) return;
      endGame('resign');
    }

    // ── End game ─────────────────────────────────────────────────
    async function endGame(reason) {
      gameOver = true;
      board.setInteractive(false);
      document.getElementById('claude-thinking').classList.remove('show');
      document.getElementById('undo-btn').disabled = true;

      const title = reason === 'resign' ? 'You resigned' : 'Game complete';
      let msg = reason === 'resign'
        ? 'Good game — review it to find where things went wrong.'
        : 'Both players passed. Calculating score…';

      document.getElementById('game-over-title').textContent = title;
      document.getElementById('game-over-msg').textContent   = msg;
      document.getElementById('game-over-card').classList.add('show');

      // Fetch KataGo score estimate for completed games (not resigns)
      if (reason !== 'resign') {
        fetch('/.netlify/functions/katago-move', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sgf: buildSGF(), color: playerColor, boardSize, rank: '1 dan' }),
        }).then(r => r.ok ? r.json() : null).then(data => {
          if (data?.scoreLead != null) {
            const lead = data.scoreLead;
            const ahead = (playerColor === 'B' ? lead > 0 : lead < 0);
            const pts   = Math.abs(lead).toFixed(1);
            const who   = ahead ? 'You lead' : 'Goxira leads';
            document.getElementById('game-over-msg').textContent =
              `${who} by ~${pts} points (KataGo estimate). Review to see how it played out.`;
          } else {
            document.getElementById('game-over-msg').textContent =
              'Both players passed. Time to count the score!';
          }
        }).catch(() => {
          document.getElementById('game-over-msg').textContent =
            'Both players passed. Time to count the score!';
        });
      }

      try {
        const saved = await UserDB.saveGame(userId, buildSGF(), boardSize, 'live_play');
        savedGameId = saved.id;
      } catch(e) { console.error('Save game error:', e); }
    }

    function reviewGame() {
      location.href = savedGameId ? `review.html?id=${savedGameId}` : 'review.html';
    }
    function newGame() { location.reload(); }

    // ── SGF ───────────────────────────────────────────────────────
    const SGFCOLS = 'abcdefghijklmnopqrs';
    function addSGFMove(color, col, row) { sgfMoves.push(`;${color}[${SGFCOLS[col]}${SGFCOLS[row]}]`); }
    function addSGFPass(color)           { sgfMoves.push(`;${color}[]`); }
    function buildSGF()                  { return `(;GM[1]FF[4]SZ[${boardSize}]${sgfMoves.join('')})`; }

    // ── UI ────────────────────────────────────────────────────────
    function setCommentary(text) {
      const el = document.getElementById('move-commentary');
      el.textContent = text;
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function updateTurnIndicator(color) {
      const isPlayer = color === playerColor;
      document.getElementById('tag-player').classList.toggle('active',  isPlayer);
      document.getElementById('tag-claude').classList.toggle('active', !isPlayer);
    }
    function updateMoveCount() {
      document.getElementById('move-count').textContent = `Move ${moveNumber}`;
    }
    function getEffectiveRank() {
      const rank  = userProfile?.current_rank || '20 kyu';
      const match = rank.match(/(\d+)\s*(kyu|dan)/);
      if (!match || match[2] !== 'kyu') return rank;
      if (difficulty === 'easier') return `${Math.min(30, parseInt(match[1]) + 5)} kyu`;
      if (difficulty === 'harder') return `${Math.max(1,  parseInt(match[1]) - 5)} kyu`;
      return rank;
    }

    async function getGameHint() {
      if (gameOver) return;
      const btn = document.getElementById('hint-btn');
      btn.disabled    = true;
      btn.textContent = 'Goxira is thinking…';
      try {
        const res = await fetch('/.netlify/functions/game-hint', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sgf: buildSGF(), boardSize,
            rank: userProfile?.current_rank || '20 kyu',
            playerColor, currentStones: board.getStones(), moveNumber,
          }),
        }).then(r => r.json());
        setCommentary('💬 ' + res.commentary);
      } catch(e) {
        setCommentary('Could not get commentary right now.');
      }
      btn.disabled    = false;
      btn.textContent = '💬 Ask Goxira for commentary';
    }

    init();
  </script>
</body>
</html>
