<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play — Goxira</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page-main { padding-top: 1.25rem; }

    /* ── Setup screen ── */
    .setup-screen {
      max-width: 400px; margin: 0 auto; padding: 1rem 0;
    }
    .setup-screen h2 { margin-bottom: 1.5rem; }

    .option-group { margin-bottom: 1.5rem; }
    .option-group__label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.6rem;
    }
    .option-pills {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
    }
    .option-pill {
      padding: 0.5rem 1.1rem;
      border: 1.5px solid var(--paper-deep);
      border-radius: 100px;
      font-size: 0.875rem; font-weight: 500; color: var(--ink-light);
      cursor: pointer; transition: all 0.15s; background: white;
      font-family: var(--font-sans);
    }
    .option-pill.selected {
      background: var(--ink); color: var(--paper);
      border-color: var(--ink);
    }

    .color-options {
      display: flex; gap: 0.75rem;
    }
    .color-option {
      flex: 1; padding: 0.875rem;
      border: 1.5px solid var(--paper-deep);
      border-radius: var(--r-md);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      cursor: pointer; transition: all 0.15s; background: white;
    }
    .color-option.selected { border-color: var(--ink); background: var(--paper-warm); }
    .color-option__stone {
      width: 36px; height: 36px; border-radius: 50%;
    }
    .color-option__stone--b {
      background: var(--ink);
      box-shadow: 2px 2px 0 rgba(255,255,255,0.15) inset, var(--shadow-sm);
    }
    .color-option__stone--w {
      background: white;
      border: 2px solid var(--paper-deep);
      box-shadow: var(--shadow-sm);
    }
    .color-option__label { font-size: 0.8rem; font-weight: 500; color: var(--ink); }

    /* ── Game screen ── */
    .game-screen { display: none; }

    .game-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.875rem;
    }
    .game-info { display: flex; align-items: center; gap: 0.75rem; }
    .player-tag {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.8rem; font-weight: 500;
      padding: 0.3rem 0.7rem;
      border-radius: 100px;
      border: 1.5px solid var(--paper-deep);
      background: white;
    }
    .player-tag__stone {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .player-tag__stone--b { background: var(--ink); }
    .player-tag__stone--w { background: white; border: 1.5px solid var(--ink-faint); }
    .player-tag.active { border-color: var(--ink); background: var(--ink); color: var(--paper); }
    .player-tag.active .player-tag__stone--w { border-color: rgba(255,255,255,0.5); }

    .move-count {
      font-size: 0.75rem; color: var(--ink-faint);
      font-family: var(--font-serif);
    }

    .board-container {
      background: var(--board);
      border-radius: var(--r-lg);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      margin-bottom: 0.875rem;
      position: relative;
    }
    .board-overlay {
      position: absolute; inset: 0;
      background: rgba(26,20,16,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 10; border-radius: var(--r-lg);
    }
    .board-overlay__text {
      color: var(--paper); font-family: var(--font-serif);
      font-size: 1rem; text-align: center; padding: 1rem;
    }

    /* ── Claude thinking ── */
    .claude-thinking {
      display: none;
      align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.875rem;
      background: var(--paper-warm);
      border: 1px solid var(--paper-deep);
      border-radius: var(--r-md);
      font-size: 0.825rem; color: var(--ink-faint);
      font-family: var(--font-serif); font-style: italic;
      margin-bottom: 0.875rem;
    }
    .claude-thinking.show { display: flex; }

    /* ── Move commentary ── */
    .move-commentary {
      background: white;
      border: 1px solid var(--paper-deep);
      border-left: 3px solid var(--board-dark);
      border-radius: var(--r-md);
      padding: 0.75rem 1rem;
      font-family: var(--font-serif);
      font-size: 0.875rem; line-height: 1.65;
      color: var(--ink-light);
      margin-bottom: 0.875rem;
      min-height: 48px;
    }

    /* ── Game controls ── */
    .game-controls {
      display: flex; gap: 0.6rem; margin-bottom: 1rem;
    }
    .game-controls .btn { flex: 1; }

    /* ── Game over ── */
    .game-over-card {
      background: var(--ink); color: var(--paper);
      border-radius: var(--r-lg); padding: 1.5rem;
      text-align: center; margin-bottom: 1rem;
      display: none;
    }
    .game-over-card.show { display: block; }
    .game-over-card h3 { color: var(--paper); font-size: 1.2rem; margin-bottom: 0.5rem; }
    .game-over-card p  { color: rgba(245,240,232,0.7); font-size: 0.875rem; margin-bottom: 1.25rem; }

    /* ── Bottom nav ── */
    .bottom-nav { display: flex; }
  </style>
</head>
<body>

  <!-- Top nav -->
  <nav class="nav">
    <a href="home.html" class="nav__logo">
      <span class="nav__logo-stone"></span>
      Goxira
    </a>
    <div class="nav__links">
      <a href="problems.html" class="nav__link">Problems</a>
      <a href="play.html" class="nav__link active">Play</a>
      <a href="review.html" class="nav__link">Review</a>
      <a href="profile.html" class="nav__link">Profile</a>
    </div>
  </nav>

  <main class="page-main">
    <div class="container">

      <!-- ── Setup Screen ── -->
      <div class="setup-screen" id="setup-screen">
        <h2>Play vs Claude</h2>

        <div class="option-group">
          <p class="option-group__label">Board Size</p>
          <div class="option-pills">
            <button class="option-pill selected" data-size="9" onclick="selectSize(this)">9×9</button>
            <button class="option-pill" data-size="13" onclick="selectSize(this)">13×13</button>
            <button class="option-pill" data-size="19" onclick="selectSize(this)">19×19</button>
          </div>
        </div>

        <div class="option-group">
          <p class="option-group__label">Play as</p>
          <div class="color-options">
            <div class="color-option selected" data-color="B" onclick="selectColor(this)">
              <div class="color-option__stone color-option__stone--b"></div>
              <span class="color-option__label">Black</span>
              <span style="font-size:0.7rem;color:var(--ink-faint)">Goes first</span>
            </div>
            <div class="color-option" data-color="W" onclick="selectColor(this)">
              <div class="color-option__stone color-option__stone--w"></div>
              <span class="color-option__label">White</span>
              <span style="font-size:0.7rem;color:var(--ink-faint)">Goes second</span>
            </div>
          </div>
        </div>

        <div class="option-group">
          <p class="option-group__label">Difficulty</p>
          <div class="option-pills">
            <button class="option-pill selected" data-diff="match" onclick="selectDiff(this)">Match my rank</button>
            <button class="option-pill" data-diff="easier" onclick="selectDiff(this)">Easier</button>
            <button class="option-pill" data-diff="harder" onclick="selectDiff(this)">Harder</button>
          </div>
        </div>

        <button class="btn btn--primary btn--full btn--lg" onclick="startGame()">
          Start Game
        </button>
      </div>

      <!-- ── Game Screen ── -->
      <div class="game-screen" id="game-screen">

        <!-- Header -->
        <div class="game-header">
          <div class="game-info">
            <div class="player-tag" id="tag-player">
              <div class="player-tag__stone" id="tag-player-stone"></div>
              <span id="tag-player-label">You</span>
            </div>
            <span style="font-size:0.75rem;color:var(--ink-faint)">vs</span>
            <div class="player-tag" id="tag-claude">
              <div class="player-tag__stone" id="tag-claude-stone"></div>
              <span>Claude</span>
            </div>
          </div>
          <span class="move-count" id="move-count">Move 0</span>
        </div>

        <!-- Board -->
        <div class="board-container" id="board-container">
          <div class="board-overlay" id="board-overlay" style="display:none">
            <p class="board-overlay__text" id="overlay-text"></p>
          </div>
        </div>

        <!-- Claude thinking -->
        <div class="claude-thinking" id="claude-thinking">
          <span class="loader" style="width:14px;height:14px;border-width:2px;color:var(--ink-faint)"></span>
          Claude is thinking…
        </div>

        <!-- Move commentary -->
        <div class="move-commentary" id="move-commentary">
          Place your stone to begin. You play <span id="commentary-color">Black</span>.
        </div>

        <!-- Game over card -->
        <div class="game-over-card" id="game-over-card">
          <h3 id="game-over-title">Game Over</h3>
          <p id="game-over-msg">Great game!</p>
          <div style="display:flex;gap:0.6rem;justify-content:center;flex-wrap:wrap;">
            <button class="btn btn--accent" onclick="reviewGame()">Review Game →</button>
            <button class="btn btn--secondary" style="color:var(--paper);border-color:rgba(255,255,255,0.3)" onclick="newGame()">Play Again</button>
          </div>
        </div>

        <!-- Controls -->
        <div class="game-controls">
          <button class="btn btn--secondary" onclick="passTurn()">Pass</button>
          <button class="btn btn--secondary" onclick="resignGame()">Resign</button>
          <button class="btn btn--secondary" onclick="newGame()">New Game</button>
        </div>

      </div>

    </div>
  </main>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <div class="bottom-nav__item" onclick="location.href='home.html'">
      <span class="bottom-nav__icon">⊞</span>Home
    </div>
    <div class="bottom-nav__item" onclick="location.href='problems.html'">
      <span class="bottom-nav__icon">🧩</span>Problems
    </div>
    <div class="bottom-nav__item active" onclick="location.href='play.html'">
      <span class="bottom-nav__icon">⚫</span>Play
    </div>
    <div class="bottom-nav__item" onclick="location.href='review.html'">
      <span class="bottom-nav__icon">🔍</span>Review
    </div>
    <div class="bottom-nav__item" onclick="location.href='profile.html'">
      <span class="bottom-nav__icon">◯</span>Profile
    </div>
  </nav>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    window.GOTUTOR_CONFIG = {
      supabaseUrl:     'https://humvrkmlvhzwoawoyslu.supabase.co',
      supabaseAnonKey: 'sb_publishable_dEQVVToEQh35MPrBEtKkmQ_om0ty8-r',
    };
  </script>
  <script src="supabase-client.js"></script>
  <script src="api.js"></script>
  <script src="board.js"></script>
  <script>
    // ── State ────────────────────────────────────────────────────
    let board        = null;
    let boardSize    = 9;
    let playerColor  = 'B';
    let claudeColor  = 'W';
    let difficulty   = 'match';
    let moveNumber   = 0;
    let sgfMoves     = [];
    let gameOver     = false;
    let consecutivePasses = 0;
    let userId       = null;
    let userProfile  = null;
    let savedGameId  = null;

    // ── Init ────────────────────────────────────────────────────
    async function init() {
      const session = await Auth.getSession();
      if (!session) { location.href = 'auth.html'; return; }
      userId      = session.user.id;
      userProfile = await UserDB.getProfile(userId);
    }

    // ── Setup selectors ──────────────────────────────────────────
    function selectSize(el) {
      document.querySelectorAll('[data-size]').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      boardSize = parseInt(el.dataset.size);
    }
    function selectColor(el) {
      document.querySelectorAll('[data-color]').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      playerColor = el.dataset.color;
      claudeColor = playerColor === 'B' ? 'W' : 'B';
    }
    function selectDiff(el) {
      document.querySelectorAll('[data-diff]').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      difficulty = el.dataset.diff;
    }

    // ── Start game ───────────────────────────────────────────────
    async function startGame() {
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('game-screen').style.display  = 'block';

      // Set up player tags
      const pStone = document.getElementById('tag-player-stone');
      const cStone = document.getElementById('tag-claude-stone');
      pStone.className = `player-tag__stone player-tag__stone--${playerColor.toLowerCase()}`;
      cStone.className = `player-tag__stone player-tag__stone--${claudeColor.toLowerCase()}`;
      document.getElementById('commentary-color').textContent = playerColor === 'B' ? 'Black' : 'White';

      // Create board
      const container = document.getElementById('board-container');
      board = Board.create(container, boardSize, onPlayerMove);
      board.setColor('B'); // Black always goes first

      updateTurnIndicator('B');

      // If player is White, Claude goes first
      if (playerColor === 'W') {
        await claudeMove();
      }
    }

    // ── Player move ──────────────────────────────────────────────
    async function onPlayerMove(col, row) {
      if (gameOver) return;
      consecutivePasses = 0;

      board.place(col, row, playerColor);
      moveNumber++;
      addSGFMove(playerColor, col, row);
      updateMoveCount();
      updateTurnIndicator(claudeColor);

      document.getElementById('move-commentary').textContent = '…';
      board.setInteractive(false);

      await claudeMove();
    }

    // ── Claude move ──────────────────────────────────────────────
    async function claudeMove() {
      if (gameOver) return;

      document.getElementById('claude-thinking').classList.add('show');

      try {
        const effectiveRank = getEffectiveRank();
        const sgf = buildSGF();
        const res = await API.getClaudeMove(sgf, claudeColor, boardSize, effectiveRank, board.getStones());
        const move = res.move;

        document.getElementById('claude-thinking').classList.remove('show');

        if (move.col === -1 && move.row === -1) {
          // Claude passes
          consecutivePasses++;
          document.getElementById('move-commentary').textContent = `Claude passes. ${move.thinking || ''}`;
          addSGFPass(claudeColor);
          if (consecutivePasses >= 2) { endGame('double-pass'); return; }
        } else {
          consecutivePasses = 0;
          board.place(move.col, move.row, claudeColor);
          moveNumber++;
          addSGFMove(claudeColor, move.col, move.row);
          updateMoveCount();
          document.getElementById('move-commentary').textContent = move.thinking || 'Claude played.';
        }

        updateTurnIndicator(playerColor);
        board.setColor(playerColor);
        board.setInteractive(true);

      } catch(e) {
        console.error('Claude move error:', e);
        document.getElementById('claude-thinking').classList.remove('show');
        document.getElementById('move-commentary').textContent = 'Claude had trouble thinking — your turn.';
        board.setInteractive(true);
      }
    }

    // ── Pass ─────────────────────────────────────────────────────
    async function passTurn() {
      if (gameOver) return;
      consecutivePasses++;
      addSGFPass(playerColor);
      moveNumber++;
      updateMoveCount();
      document.getElementById('move-commentary').textContent = 'You passed.';

      if (consecutivePasses >= 2) { endGame('double-pass'); return; }
      board.setInteractive(false);
      updateTurnIndicator(claudeColor);
      await claudeMove();
    }

    // ── Resign ────────────────────────────────────────────────────
    function resignGame() {
      if (gameOver) return;
      endGame('resign');
    }

    // ── End game ─────────────────────────────────────────────────
    async function endGame(reason) {
      gameOver = true;
      board.setInteractive(false);

      let title, msg;
      if (reason === 'resign') {
        title = 'You resigned';
        msg   = 'Good game — review it to find where things went wrong.';
      } else if (reason === 'double-pass') {
        title = 'Game ended by agreement';
        msg   = 'Both players passed. Time to count the score!';
      }

      document.getElementById('game-over-title').textContent = title;
      document.getElementById('game-over-msg').textContent   = msg;
      document.getElementById('game-over-card').classList.add('show');

      // Save game to Supabase
      try {
        const sgf = buildSGF();
        const saved = await UserDB.saveGame(userId, sgf, boardSize, 'live_play');
        savedGameId = saved.id;
      } catch(e) {
        console.error('Save game error:', e);
      }
    }

    function reviewGame() {
      if (savedGameId) location.href = `review.html?id=${savedGameId}`;
      else location.href = 'review.html';
    }

    function newGame() { location.reload(); }

    // ── SGF helpers ───────────────────────────────────────────────
    const COLS = 'abcdefghijklmnopqrs';

    function addSGFMove(color, col, row) {
      sgfMoves.push(`;${color}[${COLS[col]}${COLS[row]}]`);
    }
    function addSGFPass(color) {
      sgfMoves.push(`;${color}[]`);
    }
    function buildSGF() {
      const sz = boardSize;
      return `(;GM[1]FF[4]SZ[${sz}]${sgfMoves.join('')})`;
    }

    // ── UI helpers ────────────────────────────────────────────────
    function updateTurnIndicator(color) {
      const isPlayer = color === playerColor;
      document.getElementById('tag-player').classList.toggle('active',  isPlayer);
      document.getElementById('tag-claude').classList.toggle('active', !isPlayer);
    }

    function updateMoveCount() {
      document.getElementById('move-count').textContent = `Move ${moveNumber}`;
    }

    function getEffectiveRank() {
      const rank = userProfile?.current_rank || '20 kyu';
      if (difficulty === 'easier') {
        // Play a few kyu weaker
        const match = rank.match(/(\d+)\s*(kyu|dan)/);
        if (match && match[2] === 'kyu') return `${Math.min(30, parseInt(match[1]) + 5)} kyu`;
      } else if (difficulty === 'harder') {
        const match = rank.match(/(\d+)\s*(kyu|dan)/);
        if (match && match[2] === 'kyu') return `${Math.max(1, parseInt(match[1]) - 5)} kyu`;
      }
      return rank;
    }

    init();
  </script>
</body>
</html>
